<!DOCTYPE html>
<!-- sitewomen/women/templates/index.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> {{ main_title|default:"без заголовка" }} </title>
</head>
<body>
<p> {{ menu|join:" | " }}</p>
<h1> {{ title|capfirst|cut:" " }}</h1>
<ul>
    {% for p in posts %}
    <li>
        <h2> {{ p.title }} </h2>
        <p> {{ p.content }} </p>
        <hr>
    </li>
    {% endfor %}
</ul>
</body>
</html>
